name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sensitive String Scan
        run: |
          ./scripts/check_sensitive_strings.sh
          ./scripts/check_client_boundary.sh

      - name: Shell Script Syntax
        run: |
          bash -n \
            scripts/check_sensitive_strings.sh \
            scripts/check_client_boundary.sh \
            scripts/load_env.sh \
            scripts/run_p1_validation.sh

      - name: Backend Install
        run: cd backend && npm ci

      - name: Backend Type Check
        run: cd backend && npx tsc --noEmit

  ios-validation:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Build
        run: |
          xcodebuild \
            -project bruh.xcodeproj \
            -scheme bruh \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Smoke Validation
        run: ./scripts/run_p1_validation.sh
